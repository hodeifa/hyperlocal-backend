# ==============================================================================
# GOLANGCI-LINT CONFIGURATION
# Hyperlocal Backend - Monorepo Microservices
# ==============================================================================
# Documentation: https://golangci-lint.run/usage/configuration/
# ==============================================================================

run:
  # Timeout analisa (naikkan jika repo besar)
  timeout: 5m
  
  # Versi Go yang ditargetkan
  go: "1.22"
  
  # Folder yang di-skip (jangan di-lint)
  skip-dirs:
    - migrations           # SQL files, bukan Go
    - proto                # Generated protobuf files
    - vendor               # Dependencies
    - testdata             # Test fixtures
    - tmp                  # Temporary files
    - docs                 # Documentation
  
  # File yang di-skip
  skip-files:
    - ".*\\.pb\\.go$"           # Generated protobuf
    - ".*_grpc\\.pb\\.go$"      # Generated gRPC
    - ".*_mock\\.go$"           # Generated mocks
    - "mock_.*\\.go$"           # Generated mocks

# ==============================================================================
# OUTPUT CONFIGURATION
# ==============================================================================
output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

# ==============================================================================
# LINTERS CONFIGURATION
# ==============================================================================
linters:
  # Disable semua linter default, lalu aktifkan yang kita butuhkan
  disable-all: true
  enable:
    # === CORE SAFETY ===
    - errcheck              # Wajib: cek error tidak di-handle
    - gosimple              # Simplifikasi kode
    - govet                 # Official Go vet
    - ineffassign           # Detect unused assignments
    - staticcheck           # Static analysis (paling powerful)
    - unused                # Detect unused code
    
    # === CODE QUALITY ===
    - revive                # Pengganti golint (lebih modern)
    - gocritic              # Best practices & suggestions
    - gofmt                 # Formatting standar
    - goimports             # Auto-manage imports
    - misspell              # Cek typo di comments/strings
    - prealloc              # Saran pre-allocation slice
    - unconvert             # Hapus type conversion yang tidak perlu
    
    # === SECURITY (PENTING untuk Fintech) ===
    - gosec                 # Security scanner
    - bodyclose             # Cek http.Response.Body di-close
    - noctx                 # HTTP request harus pakai context
    - rowserrcheck          # Cek sql.Rows error
    - sqlclosecheck         # Cek SQL rows/stmt di-close
    
    # === PERFORMANCE ===
    - gocyclo               # Kompleksitas cyclomatic (max 20)
    - nestif                # Nested if complexity
    
    # === BEST PRACTICES ===
    - dupl                  # Detect duplicate code
    - goconst               # Detect repeated strings (bisa jadi const)
    - nilerr                # Return nil setelah cek error
    
    # === STYLE (opsional, bisa di-disable jika terlalu strict) ===
    - whitespace            # Spasi yang tidak perlu
    - unparam               # Unused function parameters

# ==============================================================================
# LINTER SETTINGS (Tuning individual linters)
# ==============================================================================
linters-settings:
  # errcheck: anggap beberapa fungsi aman di-ignore
  errcheck:
    check-type-assertions: true
    check-blank: false  # Jangan paksa `_ = f()` jika tidak perlu
    exclude-functions:
      - fmt.Fprintf
      - fmt.Fprint
      - fmt.Fprintln
      - (io.Closer).Close
      - (*go.uber.org/zap.Logger).Sync
  
  # gocyclo: batas kompleksitas fungsi
  gocyclo:
    min-complexity: 20  # Angka 15-25 reasonable, 20 untuk phase awal
  
  # govet: aktifkan checker tambahan
  govet:
    enable:
      - shadow              # Detect variable shadowing
      - fieldalignment      # Detect struct field alignment issues
  
  # revive: aturan pengganti golint
  revive:
    rules:
      - name: exported
        arguments:
          - disableStutteringCheck
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unreachable-code
  
  # gocritic: disable rule yang terlalu noisy
  gocritic:
    disabled-checks:
      - ifElseChain         # Boleh if-else panjang
      - singleCaseSwitch    # Boleh switch 1 case
      - assignOp            # Terkadang lebih readable
    enabled-tags:
      - diagnostic
      - style
      - performance
  
  # gosec: exclude beberapa rule yang terlalu strict untuk dev
  gosec:
    excludes:
      - G104                # Errors unhandled (sudah di-cover errcheck)
      - G304                # File path provided as taint input (kita handle manual)
      - G402                # TLS MinVersion (bukan production server)
  
  # dupl: threshold duplicate code
  dupl:
    threshold: 150          # Lines of code (naikkan jika banyak boilerplate)
  
  # goconst: detect repeated strings
  goconst:
    min-len: 3
    min-occurrences: 3
  
  # misspell: cek typo
  misspell:
    locale: US
    ignore-words:
      - "cancelled"         # British spelling, sering dipakai di API
  
  # unparam: detect unused function params
  unparam:
    check-exported: false   # Jangan cek exported functions

# ==============================================================================
# ISSUES CONFIGURATION (Filter & Exclude)
# ==============================================================================
issues:
  # Maximum issues count sebelum fail (0 = unlimited)
  max-issues-per-linter: 0
  max-same-issues: 0
  
  # Exclude patterns global
  exclude-rules:
    # Test files boleh lebih fleksibel
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
        - goconst
        - unparam
    
    # File generated protobuf tidak perlu di-lint
    - path: \.pb\.go
      linters:
        - all
    
    # Mock files tidak perlu di-lint strict
    - path: mock_.*\.go|.*_mock\.go
      linters:
        - all
    
    # Folder pkg/errors custom, boleh panic di kondisi tertentu
    - path: pkg/errors/
      linters:
        - gosec
    
    # Migration tools tidak strict
    - path: scripts/
      linters:
        - all

  # Jangan exclude issue penting ini
  exclude-use-default: false
  exclude:
    # Jangan exclude error yang sebenarnya penting
    - "Error return value of .((os\\.)?std(out|err)\\..*|.*Close|.*Flush|os\\.Remove(All)?|.*printf?|os\\.(Un)?Setenv). is not checked"

# ==============================================================================
# SEVERITY (Tingkatan error)
# ==============================================================================
severity:
  default-severity: error
  rules:
    # Style issues = warning (tidak fail build)
    - severity: warning
      linters:
        - revive
        - gocritic
        - whitespace
        - misspell
        - dupl